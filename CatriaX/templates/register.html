<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - CATIRAX</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <!-- ==========================================
         FORMAS ANIMADAS DE FUNDO
         ========================================== -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="auth-container">
        <div class="auth-box" style="max-width: 700px; padding: 2.5rem 3rem;">
            <h2>Criar Conta</h2>
            
            <!-- ==========================================
                 FORMULÁRIO DE CADASTRO
                 ========================================== -->
            <form id="formCadastro" novalidate>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px;">
                    
                    <!-- CAMPO: NOME COMPLETO -->
                    <div class="input-group" style="grid-column: 1 / -1;">
                        <label>Nome Completo</label>
                        <div class="input-wrapper">
                            <!-- Ícone Usuário -->
                            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            <input type="text" id="nomeCompleto" name="nome" placeholder="Seu nome completo" required>
                        </div>
                    </div>

                    <!-- CAMPO: CPF -->
                    <div class="input-group">
                        <label>CPF</label>
                        <div class="input-wrapper">
                            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
                            </svg>
                            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required maxlength="14">
                        </div>
                    </div>

                    <!-- CAMPO: TELEFONE -->
                    <div class="input-group">
                        <label>Telefone</label>
                        <div class="input-wrapper">
                            <!-- Ícone Telefone -->
                            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                            </svg>
                            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required maxlength="15">
                        </div>
                    </div>

                    <!-- CAMPO: EMAIL -->
                    <div class="input-group" style="grid-column: 1 / -1;">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <!-- Ícone Email -->
                            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                            <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <!-- CAMPO: SENHA -->
                    <div class="input-group">
                        <label>Senha</label>
                        <div class="input-wrapper">
                            <!-- Ícone Cadeado -->
                            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                            <input type="password" id="senha" name="senha" placeholder="Mín. 8 caracteres" style="padding-right: 40px;" required>
                            <span class="toggle-password" onclick="toggleSenha('senha')" style="position: absolute; right: 14px; cursor: pointer; user-select: none;">👁️</span>
                        </div>
                    </div>

                    <!-- CAMPO: CONFIRMAR SENHA -->
                    <div class="input-group">
                        <label>Confirmar Senha</label>
                        <div class="input-wrapper">
                            <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                            </svg>
                            <input type="password" id="confirmSenha" name="confirmar_senha" placeholder="Confirme sua senha" style="padding-right: 40px;" required>
                            <span class="toggle-password" onclick="toggleSenha('confirmSenha')" style="position: absolute; right: 14px; cursor: pointer; user-select: none;">👁️</span>
                        </div>
                    </div>

                </div>

                <!-- BOTÃO PARA ENVIAR FORMULÁRIO -->
                <button type="submit" class="btn-auth" id="BotaoDeEnviar" style="margin-top: 20px;">Criar minha conta</button>
            </form>

            <!-- ==========================================
                 LINKS DE NAVEGAÇÃO
                 ========================================== -->
            <div class="auth-links-container">
                <a href="login.html">
                    <span style="display: flex; align-items: center; justify-content: center; gap: 5px;">
                        <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                        </svg>
                        Já tenho conta. Fazer login
                    </span>
                </a>
            </div>
        </div>
    </div>

    <script src="/static/js/register.js"></script>
</body>
</html>
