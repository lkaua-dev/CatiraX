<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Senha - CATIRAX</title>
    <link rel="stylesheet" href="/CatriaX/static/css/style.css" />
</head>

<body>
    <!-- ==========================================
         FORMAS ANIMADAS DE FUNDO
         ========================================== -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Recuperar Senha</h2>

            <p style="color: #5c6bc0; margin-bottom: 1.8rem; font-size: 0.95rem; line-height: 1.4;">
                Digite o e-mail cadastrado e enviaremos as instruções para você.
            </p>

            <!-- ==========================================
                 FORMULÁRIO DE RECUPERAÇÃO DE SENHA
                 ========================================== -->
            <form id="formRecover">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <input type="email" id="email" placeholder="seu@email.com" required />
                    </div>
                </div>

                <!-- BOTÃO PARA ENVIAR E-MAIL DE RECUPERAÇÃO -->
                <button type="submit" class="btn-auth">Enviar Link</button>
            </form>

            <!-- ==========================================
                 LINKS DE NAVEGAÇÃO
                 ========================================== -->
            <div class="auth-links-container" style="margin-top: 1rem;">
                <a href="login.html">
                    <span style="display: flex; align-items: center; justify-content: center; gap: 5px;">
                        <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" width="16" height="16"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Voltar para Login
                    </span>
                </a>
            </div>
        </div>
    </div>

    <script src="/CatriaX/static/js/recover.js"></script>
</body>

</html>
