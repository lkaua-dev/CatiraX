<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CatiraX</title>
    <link rel="stylesheet" href="/CatriaX/static/css/style.css">
</head>

<body>
    <!-- ==========================================
         FORMAS ANIMADAS DE FUNDO
         ========================================== -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Bem-vindo!</h2>
            <!-- ==========================================
                 FORMULÁRIO DE LOGIN
                 ========================================== -->
            <form id="formLogin" novalidate>
                <!-- CAMPO: EMAIL -->
                <div class="input-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <input type="email" id="email" placeholder="seu@email.com" required />
                    </div>
                </div>

                <!-- CAMPO: SENHA -->
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrapper">
                        <svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <input type="password" id="senha" placeholder="Sua senha" required />
                    </div>
                </div>

                <!-- BOTÃO PARA ENVIAR FORMULÁRIO -->
                <button type="submit" class="btn-auth" id="btnSubmit">Entrar</button>
            </form>

            <!-- ==========================================
                 LINKS DE NAVEGAÇÃO
                 ========================================== -->
            <div class="auth-links-container">
                <a href="recover.html">Esqueci minha senha</a>
                <a href="register.html">Não tem uma conta? Cadastre-se</a>
            </div>
        </div>
    </div>

    <script src="/CatriaX/static/js/login.js"></script>
</body>

</html>
